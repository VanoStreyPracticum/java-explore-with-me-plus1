server:
  port: 8080
spring:
  application:
    name: gateway-server
  config:
    import: optional:configserver:http://config-server:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: main-service
          uri: http://ewm-service:8081
          filters:
            - name: Retry
              args:
                retries: 5
                statuses:
                  - INTERNAL_SERVER_ERROR
                  - SERVICE_UNAVAILABLE
                backoff:
                  firstBackoff: 1s
                  maxBackoff: 5s
                  factor: 2
          predicates:
            - Path=/users/**,/admin/**,/categories/**,/events/**,/compilations/**,/locations/**
eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
