server:
  port: 8080

spring:
  application:
    name: gateway-server
  config:
    import: optional:configserver:http://config-server:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      routes:
        - id: main-service
          uri: http://ewm-service:8080
          predicates:
            - Path=/users/**,/admin/**,/categories/**,/events/**,/compilations/**,/locations/**
