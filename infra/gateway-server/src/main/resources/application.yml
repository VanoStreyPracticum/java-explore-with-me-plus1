server:
  port: 8080

spring:
  application:
    name: gateway-server
  config:
    import: optional:configserver:http://config-server:8888
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
      routes:
        - id: main-service
          uri: lb://main-service
          predicates:
            - Path=/users/**,/admin/**,/categories/**,/events/**,/compilations/**,/locations/**

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://discovery-server:8761/eureka/}
  instance:
    instance-id: ${spring.application.name}:${random.value}
