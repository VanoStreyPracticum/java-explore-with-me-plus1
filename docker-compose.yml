version: '3.8'
services:
  config-server:
    build: infra/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    healthcheck:
      test: curl -f http://localhost:8888/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      - SPRING_PROFILES_ACTIVE=native

  discovery-server:
    build: infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    healthcheck:
      test: curl -f http://localhost:8761/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  stats-db:
    image: postgres:15-alpine
    container_name: stats-db
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - stats_db_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -d stats
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  stats-server:
    build: stats-service/stats-server
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: "9090"
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: curl -f http://localhost:9090/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  ewm-db:
    image: postgres:15-alpine
    container_name: ewm-db
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ewm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -d main_db
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  ewm-service:
    build: core/main-service
    container_name: ewm-service
    depends_on:
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      MAIN_DB_URL: jdbc:postgresql://ewm-db:5432/main_db
      MAIN_DB_USER: postgres
      MAIN_DB_PASSWORD: postgres
      STATS_SERVER_URL: http://stats-server:9090
      SERVER_PORT: "8081"
      SPRING_APPLICATION_NAME: main-service
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: curl -f http://localhost:8081/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

  gateway-server:
    build: infra/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      ewm-service:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    healthcheck:
      test: curl -f http://localhost:8080/actuator/health || exit 1
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  stats_db_data:
  ewm_db_data:
